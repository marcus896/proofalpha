name: Bug report
description: Report a reproducible ProofAlpha defect
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: "Do not include credentials, account data, proprietary strategies, or private paths."
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include commands and sanitized inputs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I removed credentials, account information, and private strategy data.
          required: true
        - label: This is not a confidential security vulnerability.
          required: true
