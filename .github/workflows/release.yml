name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install release tooling and project
        run: |
          python -m pip install --upgrade pip build pip-audit ruff
          python -m pip install -e .
      - name: Verify release candidate
        run: |
          python -m unittest discover -s tests -q
          python -m compileall -q src tests scripts
          python -m ruff check src --select F821,F811
          python scripts/check_repository_secrets.py
          python scripts/verify_public_export.py --root .
          python -m pip_audit -r requirements-core.txt
          proofalpha doctor --format json
          proofalpha run --config examples/minimal_builtin_study.json --output-dir /tmp/proofalpha-release-smoke
      - name: Build distributions
        run: python -m build
      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --draft --generate-notes --title "${GITHUB_REF_NAME}"
