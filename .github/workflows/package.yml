name: package

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - name: Install built wheel in a clean target
        run: python -m pip install dist/*.whl
      - run: proofalpha doctor --format json
      - uses: actions/upload-artifact@v7
        with:
          name: proofalpha-dist
          path: dist/*
