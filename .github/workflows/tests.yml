name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install ProofAlpha
        run: python -m pip install --upgrade pip && python -m pip install -e .
      - name: Verify public export boundary before generated files exist
        run: python scripts/verify_public_export.py --root .
      - name: Run full unit and integration suite
        run: python -m unittest discover -s tests -q
      - name: Compile sources
        run: python -m compileall -q src tests scripts
      - name: Check undefined names and duplicate definitions
        run: |
          python -m pip install "ruff>=0.8"
          python -m ruff check src --select F821,F811
      - name: Run release doctor
        run: proofalpha doctor --format json
      - name: Run safe no-key example
        run: proofalpha run --config examples/minimal_builtin_study.json --output-dir /tmp/proofalpha-ci-smoke
      - name: Validate repository metadata and brand SVGs
        run: |
          python -c "import json, pathlib, tomllib, xml.etree.ElementTree as ET; json.load(open('PUBLIC_EXPORT_MANIFEST.json', encoding='utf-8-sig')); tomllib.load(open('pyproject.toml','rb')); [ET.parse(p) for p in pathlib.Path('assets/brand').glob('*.svg')]"
      - name: Verify public export boundary
        run: python scripts/verify_public_export.py --root .
      - name: Scan repository text for credentials
        run: python scripts/check_repository_secrets.py
