<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">ProofAlpha social preview</title>
  <desc id="desc">ProofAlpha evidence gate for crypto strategies: stop promoting backtest luck.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#080D12"/>
      <stop offset="0.58" stop-color="#101820"/>
      <stop offset="1" stop-color="#07140D"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" x2="1">
      <stop offset="0" stop-color="#B7FF4A"/>
      <stop offset="1" stop-color="#1EE8A5"/>
    </linearGradient>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>
  <rect width="1280" height="640" rx="34" fill="url(#bg)"/>
  <circle cx="1040" cy="122" r="240" fill="#163C23" opacity="0.36"/>
  <circle cx="164" cy="568" r="250" fill="#1A2A3B" opacity="0.5"/>

  <g transform="translate(76 66)">
    <rect x="0" y="0" width="92" height="92" rx="22" fill="#111315" stroke="#2D3A25" stroke-width="2"/>
    <g transform="translate(18 18) scale(.112)">
      <path d="M133 356 232 126h58l96 230h-66l-21-57H215l-22 57h-60Zm104-113h43l-21-63-22 63Z" fill="#F4F1E8"/>
      <path d="m105 276 57 57 129-154" fill="none" stroke="#B7FF4A" stroke-width="38" stroke-linecap="square" stroke-linejoin="miter"/>
      <path d="M307 302h91" stroke="#B7FF4A" stroke-width="38" stroke-linecap="square"/>
    </g>
    <text x="120" y="40" class="sans" font-size="40" font-weight="820" fill="#F4F1E8" letter-spacing="-1.8">Proof<tspan fill="#B7FF4A">Alpha</tspan></text>
    <text x="122" y="76" class="sans" font-size="18" font-weight="700" fill="#9AA7B2" letter-spacing="2.2">EVIDENCE BEFORE EXECUTION</text>
  </g>

  <text x="76" y="238" class="sans" font-size="64" font-weight="860" fill="#F4F1E8" letter-spacing="-3">Stop promoting</text>
  <text x="76" y="312" class="sans" font-size="64" font-weight="860" fill="url(#signal)" letter-spacing="-3">backtest luck.</text>
  <text x="80" y="372" class="sans" font-size="27" font-weight="520" fill="#BCC7D1">Backtest, stress test, paper test, then block or promote with evidence.</text>

  <g transform="translate(80 438)">
    <rect x="0" y="0" width="486" height="94" rx="20" fill="#10161D" stroke="#2D3A47" stroke-width="2"/>
    <text x="28" y="39" class="mono" font-size="22" fill="#7DD3FC">$</text>
    <text x="60" y="39" class="mono" font-size="22" fill="#F4F1E8">proofalpha run --config examples/minimal_builtin_study.json</text>
    <text x="28" y="73" class="mono" font-size="19" fill="#B7FF4A">status: blocked  ·  safety gate working</text>
  </g>

  <g transform="translate(740 206)">
    <rect x="0" y="0" width="420" height="276" rx="26" fill="#121922" stroke="#2D3A47" stroke-width="2"/>
    <text x="34" y="52" class="sans" font-size="30" font-weight="820" fill="#F4F1E8">RunCard</text>
    <rect x="260" y="24" width="122" height="42" rx="14" fill="#2A1518" stroke="#FF6B6B" stroke-width="2"/>
    <text x="321" y="52" class="sans" font-size="19" text-anchor="middle" font-weight="820" fill="#FF8A8A">BLOCKED</text>
    <text x="34" y="105" class="mono" font-size="19" fill="#9AA7B2">decision</text>
    <text x="162" y="105" class="mono" font-size="19" fill="#FFB86B">do_not_promote</text>
    <text x="34" y="154" class="sans" font-size="23" font-weight="760" fill="#F4F1E8">blocked reasons</text>
    <text x="34" y="196" class="mono" font-size="18" fill="#C9D3DC">• capacity_5x</text>
    <text x="34" y="226" class="mono" font-size="18" fill="#C9D3DC">• turnover_budget</text>
    <text x="34" y="256" class="mono" font-size="18" fill="#C9D3DC">• min_oos_trades</text>
  </g>
</svg>
